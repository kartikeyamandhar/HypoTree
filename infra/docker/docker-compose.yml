version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hypotree
      POSTGRES_PASSWORD: hypotree
      POSTGRES_DB: hypotree
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/api/.env
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
